<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
     <link rel="stylesheet" href="style.css">
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>
      Frontend Mentor | Newsletter sign-up form with success message
    </title>
  </head>
  <body>
    <section class="flex-row Newsletter">
      <section class="Content">
        <h1 class="Updated">Stay updated!</h1>
        <p class="text">Join 60,000+ product managers receiving monthly updates on:</p>
        <form action="" class="signup">
          <ul>
            <li>Product discovery and building what matters</li>
            <li>Measuring to ensure updates are a success</li>
            <li>And much more!</li>
          </ul>
          <div class="emailAdsress">
            <label for="Email">Email address</label><br>
            <input
              type="email"
              name="Email"
              id=" Email"
              placeholder="email@company.com"
            />
          </div>
          <input type="submit" value=" Subscribe to monthly newsletter" />
        </form>
      </section>
      <section class="image">
        <img src="assets/images/illustration-sign-up-desktop.svg" alt="signUp" width="100%">
      </section>
    </section>

    <!-- <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Laiba Ijaz</a>.
  </footer> -->
  <script src="script.js"></script>
  </body>
</html>
